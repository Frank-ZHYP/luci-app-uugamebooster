name: 打包UU加速器

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: luci-app-uugamebooster
  PACKAGE_DIR: luci-app-uugamebooster
  # 指定目标架构
  TARGET_ARCH: aarch64_cortex-a53

permissions:
  contents: write
  
jobs:
  Compile:
    name: 编译 APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install curl git tar zstd python3 python3-pyelftools python3-setuptools build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget

      - name: 克隆 OpenWrt 源码
        run: |
          git clone -b openwrt-25.12 --single-branch https://github.com/openwrt/openwrt.git openwrt-25.12

      - name: 更新并安装 Feeds
        run: |
          cd openwrt-25.12
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制软件包源码
        run: |
          mkdir -p openwrt-25.12/package/${PACKAGE_NAME}
          cp -a "${PACKAGE_DIR}/." "openwrt-25.12/package/${PACKAGE_NAME}/"

      - name: 配置编译环境
        run: |
          cd openwrt-25.12
          # 创建基础配置，选择目标架构
          echo "CONFIG_TARGET_armsr=y" >> .config
          echo "CONFIG_TARGET_armsr_armv8=y" >> .config
          # 选中要编译的软件包
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          # 生成最终配置
          make defconfig

      - name: 编译 UU加速器
        run: |
          cd openwrt-25.12
          # 开始编译，V=s 参数用于显示详细编译过程，便于排查错误
          make package/${PACKAGE_NAME}/compile V=s

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: uugamebooster-apk
          # 注意：APK 文件会生成在对应架构的目录下
          path: openwrt-25.12/bin/packages/${{ env.TARGET_ARCH }}/base/${{ env.PACKAGE_NAME }}-*.apk

  Release:
    runs-on: ubuntu-latest
    needs: [Compile]
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 获取版本号
        id: version
        run: |
          VERSION="$(awk -F ':=' '/^PKG_VERSION:=/ { print $2; exit }' "./${PACKAGE_DIR}/Makefile")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 下载 APK 产物
        uses: actions/download-artifact@v4
        with:
          name: uugamebooster-apk
          path: ./

      - name: 创建 Release
        uses: lmq8267/action-gh-release@master
        with:
          tag_name: ${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            luci-app-uugamebooster-*.apk
