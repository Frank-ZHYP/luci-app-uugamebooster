name: 打包UU加速器

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: luci-app-uugamebooster
  PACKAGE_DIR: luci-app-uugamebooster

permissions:
  contents: write
  
jobs:
  Compile:
    name: 打包 ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: ipk, sdk_url: "https://mirrors.pku.edu.cn/openwrt/releases/22.03.0/targets/x86/64/openwrt-sdk-22.03.0-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz", sdk_tar: "SDK.tar.xz", sdk_dir: "SDK", artifact_pattern: "luci-app-uugamebooster_*.ipk" }
          - { name: apk, sdk_url: "snapshot", sdk_tar: "SNAPSDK.tar.zst", sdk_dir: "SNAPSDK", artifact_pattern: "luci-app-uugamebooster-*.apk" }
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 安装依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get -y install curl git tar zstd python3 python3-pyelftools python3-setuptools

      - name: 下载 SDK
        run: |
          mkdir -p tmp
          if [ "${{ matrix.target.name }}" = "ipk" ]; then
            curl -SLk --connect-timeout 30 --retry 2 "${{ matrix.target.sdk_url }}" -o "./tmp/${{ matrix.target.sdk_tar }}"
            cd tmp
            tar xf ${{ matrix.target.sdk_tar }}
            mv openwrt-sdk-* ${{ matrix.target.sdk_dir }}
          else
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/x86/64/"
            SDK_NAME=$(curl -s $BASE_URL | grep -oE 'openwrt-sdk-x86-64[^"]+\.tar\.zst' | head -n 1)
            if ! curl -SLk --connect-timeout 30 --retry 2 "$BASE_URL/$SDK_NAME" -o "./tmp/${{ matrix.target.sdk_tar }}"; then
              BASE_URL2="https://mirrors.pku.edu.cn/files/openwrt/snapshots/targets/x86/64/"
              SDK_NAME=$(curl -s $BASE_URL2 | grep -oE 'openwrt-sdk-x86-64[^"]+\.tar\.zst' | head -n 1)
              curl -SLk --connect-timeout 30 --retry 2 "$BASE_URL2/$SDK_NAME" -o "./tmp/${{ matrix.target.sdk_tar }}"
            fi
            cd tmp
            zstd -d ${{ matrix.target.sdk_tar }}
            tar xf SNAPSDK.tar
            SDK_DIR=$(tar tf SNAPSDK.tar | head -n 1 | cut -d/ -f1)
            mv "$SDK_DIR" "${{ matrix.target.sdk_dir }}"
          fi

      - name: 复制源码到 SDK
        run: |
          mkdir -p "tmp/${{ matrix.target.sdk_dir }}/package/${PACKAGE_NAME}"
          cp -a "${PACKAGE_DIR}/." "tmp/${{ matrix.target.sdk_dir }}/package/${PACKAGE_NAME}/"

      - name: 安装 feeds
        run: |
          cd tmp/${{ matrix.target.sdk_dir }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "CONFIG_PACKAGE_${PACKAGE_NAME}=m" >> .config
          make defconfig

      - name: 编译 UU加速器
        run: |
          cd tmp/${{ matrix.target.sdk_dir }}
          make "package/${PACKAGE_NAME}/compile" V=99

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: uugamebooster-${{ matrix.target.name }}
          path: tmp/${{ matrix.target.sdk_dir }}/bin/packages/x86_64/base/${{ matrix.target.artifact_pattern }}

  Release:
    runs-on: ubuntu-latest
    needs: [Compile]
    steps:
      - name: 检出源码
        uses: actions/checkout@v6

      - name: 获取版本号
        id: version
        run: |
          VERSION="$(awk -F ':=' '/^PKG_VERSION:=/ { print $2; exit }' "./${PACKAGE_DIR}/Makefile")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: 下载 IPK 产物
        uses: actions/download-artifact@v4
        with:
          name: uugamebooster-ipk
          path: ./

      - name: 下载 APK 产物
        uses: actions/download-artifact@v4
        with:
          name: uugamebooster-apk
          path: ./

      - name: 创建 Release
        uses: lmq8267/action-gh-release@master
        with:
          tag_name: ${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            luci-app-uugamebooster_*.ipk
            luci-app-uugamebooster-*.apk
